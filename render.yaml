# Render 后端部署配置
# 部署后手动设置环境变量:
#   CORS_ORIGIN = https://你的Vercel域名.vercel.app
#   PORT = 8080 (Render 自动注入)
services:
  - type: web
    name: poker-api
    env: docker
    runtime: java
    plan: free
    buildCommand: cd server && chmod +x mvnw && ./mvnw package -DskipTests
    startCommand: cd server && java -jar target/poker-server-0.1.0-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: CORS_ORIGIN
        value: https://CHANGE-ME.vercel.app
      - key: PORT
        value: "8080"
