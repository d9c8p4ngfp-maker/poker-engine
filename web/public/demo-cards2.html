<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSS Playing Cards — 预览</title>
<!-- 完整引入 Jeff Yaus 的 cards.css -->
<style>
  /* ====== 下面是 Jeff Yaus 的 cards.css 原版，只改字体大小 ====== */
  .card {
    --card-color-background: #f6f6f6;
    --card-color-facedown-background: #cc9;
    --card-color-facedown-icon: #987;
    --card-color-hearts: #c00;
    --card-color-diamonds: var(--card-color-hearts);
    --card-color-spades: #000;
    --card-color-clubs: var(--card-color-spades);
    --card-border-radius: .3em;
    --card-icon-k: "\265A ";
    --card-icon-q: "\265B ";
    --card-icon-j: "\2658 ";
    --card-icon-joker: "\263A ";
    --card-icon-facedown: "\2748 ";
    --card-icon-hearts: "\2665 ";
    --card-icon-diamonds: "\2666 ";
    --card-icon-spades: "\2660 ";
    --card-icon-clubs: "\2663 ";
    --card-text-k: "K";
    --card-text-q: "Q";
    --card-text-j: "J";
    --card-text-a: "A";
    --card-text-joker: "Joker";
    --card-a11y-joker-alt: "(One-Color)";
    --card-text-facedown: "Card facedown";
    --card-text-hearts: " of hearts";
    --card-text-diamonds: " of diamonds";
    --card-text-spades: " of spades";
    --card-text-clubs: " of clubs";
  }
  .card {
    box-sizing: border-box;
    display: block;
    position: relative;
    overflow: hidden;
    width: 5em;
    height: 7em;
    background-color: #f6f6f6;
    font-family: Times, serif;
    border: .07em solid #666;
    border-radius: var(--card-border-radius);
    box-shadow: 0.07em 0.07em 0.07em 0.07em rgba(20,20,20,0.4);
  }
  .card.card-hearts { --card-icon-suit: var(--card-icon-hearts); }
  .card.card-diamonds { --card-icon-suit: var(--card-icon-diamonds); }
  .card.card-spades { --card-icon-suit: var(--card-icon-spades); }
  .card.card-clubs { --card-icon-suit: var(--card-icon-clubs); }
  .card::before {
    position: absolute;
    display: block;
    width: .8em;
    padding: .1em .2em 0 .1em;
    font-size: 1em;
    font-weight: bold;
    text-align: center;
    line-height: 1em;
  }
  .card::after {
    position: absolute;
    clip: rect(0 0 0 0);
    clip-path: inset(50%);
    height: 1px;
    overflow: hidden;
    color: transparent;
    white-space: nowrap;
    width: 1px;
  }
  .card span {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 25%;
    right: 17%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .card span:before {
    display: block;
    font-size: 1.6em;
    text-align: center;
    margin-top: -.1em;
  }
  .card span::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 1em;
    font-size: 1.6em;
    text-align: center;
  }
  .card span:last-of-type::before { display: none; content: ""; }
  .card span:last-of-type::after {
    position: absolute;
    content: "";
    inset: unset;
    top: 1em;
    right: 90%;
    display: block;
    text-align: center;
    font-size: initial;
    line-height: 1em;
  }
  .card-hearts::before,.card-hearts span { color: var(--card-color-hearts); }
  .card-diamonds::before,.card-diamonds span { color: var(--card-color-diamonds); }
  .card-clubs::before,.card-clubs span { color: var(--card-color-clubs); }
  .card-spades::before,.card-spades span { color: var(--card-color-spades); }
  .card-k::before { content: var(--card-text-k); }
  .card-q::before { content: var(--card-text-q); }
  .card-j::before { content: var(--card-text-j); }
  .card-10::before { content: "10"; }
  .card-9::before { content: "9"; }
  .card-8::before { content: "8"; }
  .card-7::before { content: "7"; }
  .card-6::before { content: "6"; }
  .card-5::before { content: "5"; }
  .card-4::before { content: "4"; }
  .card-3::before { content: "3"; }
  .card-2::before { content: "2"; }
  .card-a::before { content: var(--card-text-a); }
  .card-hearts::after { content: var(--card-text-hearts); }
  .card-diamonds::after { content: var(--card-text-diamonds); }
  .card-clubs::after { content: var(--card-text-clubs); }
  .card-spades::after { content: var(--card-text-spades); }
  .card-hearts span:last-of-type::after { content: var(--card-icon-hearts); }
  .card-diamonds span:last-of-type::after { content: var(--card-icon-diamonds); }
  .card-clubs span:last-of-type::after { content: var(--card-icon-clubs); }
  .card-spades span:last-of-type::after { content: var(--card-icon-spades); }
  .card-k span:before,.card-q span:before,.card-j span:before { font-size: 3em; line-height: 2em; }
  .card-a span:before { font-size: 3.5em; line-height: 1.3em; }
  .card-10 span:before,.card-9 span:before,.card-8 span:before { line-height: 1em; }
  .card-5 span:before,.card-4 span:before,.card-2 span:before { margin-top: -0.2em; line-height: 2.4em; }
  .card-3 span:before,.card-2 span:before { width: 1em; }
  .card-10 span:first-of-type::after { margin-top: -.2em; line-height: 2em; }
  .card-9 span:first-of-type::after { margin-top: -.1em; }
  .card-7 span:first-of-type::after { margin-top: -1.3em; }
  .card-5 span:first-of-type::after { margin-top: -.2em; }
  .card-diamonds { word-spacing: 0.4em; }
  .card-joker span:before,.card-joker-alt span:before { font-size: 4.6em; }
  .card-joker span,.card-joker-alt span,.card-facedown span { left: 0; right: 0; }
  .card-k span::before { content: var(--card-icon-k); }
  .card-q span::before { content: var(--card-icon-q); }
  .card-j span::before { content: var(--card-icon-j); }
  .card-10 span:first-of-type::after { content: var(--card-icon-suit) var(--card-icon-suit); }
  .card-9 span::after { content: var(--card-icon-suit); }
  .card-10 span::before,.card-9 span::before,.card-8 span::before {
    content: var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit);
  }
  .card-7 span::after { content: var(--card-icon-suit); }
  .card-7 span::before,.card-6 span::before {
    content: var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit);
  }
  .card-5 span::after { content: var(--card-icon-suit); }
  .card-5 span::before,.card-4 span::before { content: var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit)var(--card-icon-suit); }
  .card-3 span::before { content: var(--card-icon-suit) var(--card-icon-suit) var(--card-icon-suit); }
  .card-2 span::before { content: var(--card-icon-suit) var(--card-icon-suit); }
  .card-a span::before { content: var(--card-icon-suit); }
  .card-joker::before,.card-joker-alt::before {
    width: 100%;
    padding-left: 0;
    padding-right: 0;
    text-align: center;
    font-variant: small-caps;
    color: var(--card-color-spades);
    content: var(--card-text-joker);
  }
  .card-joker-alt::after { content: var(--card-a11y-joker-alt); }
  .card-joker > span::before,.card-joker-alt > span::before {
    display: block;
    color: var(--card-color-spades);
    content: var(--card-icon-joker);
  }
  .card-joker-alt::before,.card-joker-alt span::before { color: var(--card-color-diamonds); }
  .card.card-facedown { background-color: #bbbb77; }
  .card.card-facedown::before {
    content: var(--card-text-facedown);
    color: transparent;
  }
  .card.card-facedown::after { content: ""; }
  .card.card-facedown.card-facedown span::before {
    content: var(--card-icon-facedown);
    position: absolute;
    z-index: 2;
    inset: 0;
    color: #998877;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 2em;
  }
  .card.card-facedown.card-facedown span::after {
    content: "";
    display: flex;
    inset: 0;
    transform: none;
    width: auto;
    background-color: #bbbb77;
    border-radius: var(--card-border-radius);
    font-size: 1em;
    line-height: 5em;
    text-align: center;
    color: #998877;
    border: 0.15em dashed #b1885f;
  }

  /* ====== 页面样式 ====== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 30px 20px;
  }
  h1 { text-align: center; color: #ffd700; margin-bottom: 4px; }
  .sub { text-align: center; color: #888; margin-bottom: 28px; font-size: 0.85rem; }
  section { max-width: 960px; margin: 0 auto 36px; }
  h2 { color: #ffd700; font-size: 1.1rem; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .grid .card { font-size: 1.4rem; }
  .table-bg {
    background: radial-gradient(ellipse at center, #1a6b2e 0%, #0d4a1a 100%);
    border-radius: 16px;
    padding: 30px;
    border: 6px solid #5a3a1a;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .table-bg .card { font-size: 0.9rem; }
</style>
</head>
